<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>
    CuriousMind Admin Login
  </title>

  <link rel="stylesheet"
        href="style.css">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

</head>

<body>

<!-- LOGIN PAGE -->

<div class="ultra-login-page">

  <!-- LEFT SIDE -->

  <div class="ultra-left">

    <div class="overlay"></div>

    <div class="left-content">

      <span class="admin-badge">
        🔐 ADMIN ACCESS
      </span>

      <h1>
        CuriousMind
      </h1>

      <p>
        Manage curiosity questions,
        answers and user requests
        from one powerful dashboard.
      </p>

      <div class="feature-list">

        <div class="feature-box">
          🚀 Real-time Dashboard
        </div>

        <div class="feature-box">
          🔥 Firebase Security
        </div>

        <div class="feature-box">
          📚 Manage Questions
        </div>

        <div class="feature-box">
          💡 Modern CMS System
        </div>

      </div>

    </div>

  </div>

  <!-- RIGHT SIDE -->

  <div class="ultra-right">

    <div class="login-card-ultra">

      <div class="login-top">

        <h2>
          Welcome Back 👋
        </h2>

        <p>
          Login to continue
        </p>

      </div>

      <form id="loginForm">

        <!-- EMAIL -->

        <div class="input-box">

          <label>
            Email Address
          </label>

          <div class="input-wrapper">

            <span>📧</span>

            <input
              type="email"
              id="email"
              placeholder="Enter admin email"
              required
            >

          </div>

        </div>

        <!-- PASSWORD -->

        <div class="input-box">

          <label>
            Password
          </label>

          <div class="input-wrapper">

            <span>🔒</span>

<input
  type="password"
  id="password"
  placeholder="Enter password"
  required
>

<button
  type="button"
  id="togglePassword"
  class="toggle-password"
>
  👁
</button>

          </div>

        </div>

        <!-- FORGOT -->

        <div class="forgot-row">

          <a href="#"
             id="forgotPassword">

            Forgot Password?

          </a>

        </div>

        <!-- BUTTON -->

        <button
          type="submit"
          class="ultra-login-btn"
        >

          🚀 Login Securely

        </button>

      </form>

      <!-- FOOTER -->

      <div class="login-footer">

        Protected with Firebase Authentication

      </div>

    </div>

  </div>

</div>

<!-- LOADER -->

<div id="loader"
     class="loader">

  <div class="spinner"></div>

</div>

<script type="module"
        src="login.js"></script>

</body>
</html>

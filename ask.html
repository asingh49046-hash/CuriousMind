<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Ask Question | CuriousMind</title>

  <link rel="stylesheet" href="style.css">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<!-- NAVBAR -->

<nav class="home-navbar">

  <div class="logo">
    CuriousMind
  </div>

  <div class="nav-menu">

    <a href="index.html">
      Home
    </a>

    <a href="ask.html" class="active">
      Ask Question
    </a>

    <a href="login.html">
      Admin
    </a>

  </div>

</nav>

<!-- ASK SECTION -->

<section class="ask-page">

  <div class="ask-card">

    <h1>
      Ask Your Curiosity 🤔
    </h1>

    <p>
      Submit your question and our admin will answer it.
    </p>

    <form id="requestForm">

      <div class="input-group">

        <label>
          Ask Question
        </label>

        <textarea
          id="question"
          placeholder="Write your question..."
          required
        ></textarea>

      </div>

      <div class="input-group">

        <label>
          Your Name
        </label>

        <input
          type="text"
          id="name"
          placeholder="Enter your name"
          required
        >

      </div>

      <div class="input-group">

        <label>
          Your Gmail
        </label>

        <input
          type="email"
          id="email"
          placeholder="Write a valid email"
          required
        >

      </div>

      <button type="submit" class="publish-btn">

        🚀 Submit Request

      </button>

    </form>

  </div>

</section>

<script type="module" src="ask.js"></script>

</body>
</html>

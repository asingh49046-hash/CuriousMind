<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>CuriousMind Admin</title>

  <link rel="stylesheet" href="style.css">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link
  href="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.snow.css"
  rel="stylesheet"
/>

  </head>

<body>

<!-- ADMIN LAYOUT -->

<div class="admin-layout">

  <!-- SIDEBAR -->

  <aside class="sidebar">

    <div class="sidebar-top">

      <h2>CuriousMind</h2>

      <p>Admin Panel</p>

    </div>

    <div class="sidebar-menu">

      <a href="index.html">
        🏠 Home
      </a>

      <a href="#">
        🛠 Dashboard
      </a>

      <a href="#">
        📚 Questions
      </a>

    </div>

    <button id="logoutBtn" class="logout-btn">

      🚪 Logout

    </button>

  </aside>

  <!-- MAIN CONTENT -->

  <main class="main-content">

    <!-- TOP BAR -->

    <div class="top-bar">

      <div>

        <h1>
          Welcome Admin 👋
        </h1>

        <p>
          Manage curiosity questions and answers
        </p>

      </div>

    </div>

    <!-- WRITE QUESTION SECTION -->

    <div class="write-section">

      <div class="write-top">

        <h2>
          ✍️ Write Question & Answer
        </h2>

        <p>
          Publish detailed curiosity questions directly from admin panel.
        </p>

      </div>

      <form id="adminQuestionForm">

        <div class="admin-input-group">

          <label>
            Question Title
          </label>

          <input
            type="text"
            id="question"
            placeholder="type question here...?"
            required
          >

        </div>

        <div class="admin-input-group">

          <label>
            Detailed Answer
          </label>

          <div id="toolbar">

  <button class="ql-bold"></button>

  <button class="ql-italic"></button>

  <button class="ql-underline"></button>

  <button class="ql-strike"></button>

  <button class="ql-blockquote"></button>

  <button class="ql-code-block"></button>

  <button class="ql-list" value="ordered"></button>

  <button class="ql-list" value="bullet"></button>

  <button class="ql-link"></button>

  <button class="ql-image"></button>

  <button class="ql-clean"></button>

</div>

          <div id="editor"></div>

        </div>

        <div class="admin-double">

          <div class="admin-input-group">

            <label>
              Category
            </label>

            <select id="category">

              <option>Science</option>

              <option>Technology</option>

              <option>Human Body</option>

              <option>Nature</option>

              <option>Psychology</option>

              <option>Space</option>

              <option>Daily Life</option>

            </select>

          </div>

          <div class="admin-input-group">

            <label>
              Author Name
            </label>

            <input
              type="text"
              id="username"
              placeholder="Admin"
            >

          </div>

        </div>

        <div class="admin-input-group">



        </div>

        <button type="submit" class="publish-btn">

          🚀 Publish Question

        </button>

      </form>

    </div>

    <!-- SEARCH -->

    <div class="search-box">

      <input
        type="text"
        id="adminSearch"
        placeholder="Search questions..."
      >

    </div>

    <!-- QUESTIONS -->

    <div id="adminContainer" class="admin-question-grid"></div>
    <!-- REQUEST SECTION -->

<div class="request-section">

  <div class="request-top">

    <h2>
      📩 User Requests
    </h2>

    <p>
      Questions submitted by users
    </p>

  </div>

  <div id="requestContainer"
       class="admin-question-grid">
  </div>

</div>

  </main>

</div>

<!-- EDIT POPUP -->

<div id="editPopup" class="popup" style="display:none;">

  <div class="edit-popup-content">

    <h2>
      ✏️ Edit Question
    </h2>

    <form id="editForm">

      <input type="hidden" id="editId">

      <div class="admin-input-group">

        <label>Question</label>

        <input type="text" id="editQuestion">

      </div>

      <div class="admin-input-group">

        <label>Answer</label>

        <textarea id="editAnswer"></textarea>

      </div>

      <div class="admin-input-group">

        <label>Category</label>

        <input type="text" id="editCategory">

      </div>

      <div class="admin-input-group">

        <label>Author</label>

        <input type="text" id="editUsername">

      </div>

      <div class="admin-input-group">

        <label>Tags</label>

        <input type="text" id="editTags">

      </div>

      <div class="popup-actions">

        <button
          type="submit"
          class="save-btn"
        >
          💾 Save Changes
        </button>

        <button
          type="button"
          class="cancel-btn"
          onclick="closeEditPopup()"
        >
          ❌ Cancel
        </button>

      </div>

    </form>

  </div>

</div>

<script type="module" src="admin.js"></script>

<script src="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.js"></script>

</body>
</html>
